# .github/labeler.yml
# Maps labels to changed file patterns.
# Uses actions/labeler@v5 syntax (glob patterns).
# Docs: https://github.com/actions/labeler

"area: docs":
  - changed-files:
    - any-glob-to-any-file:
      - "docs/**"
      - "**/*.md"

"area: core":
  - changed-files:
    - any-glob-to-any-file:
      - "apps/core/**"

"area: webpanel":
  - changed-files:
    - any-glob-to-any-file:
      - "apps/webpanel/**"

"area: resource":
  - changed-files:
    - any-glob-to-any-file:
      - "apps/resource/**"

"area: database":
  - changed-files:
    - any-glob-to-any-file:
      - "packages/database/**"

"type: migration":
  - changed-files:
    - any-glob-to-any-file:
      - "packages/database/migrations/**"
      - "packages/database/src/migrations/**"

"area: shared":
  - changed-files:
    - any-glob-to-any-file:
      - "packages/shared/**"

"area: ui":
  - changed-files:
    - any-glob-to-any-file:
      - "packages/ui/**"

"type: ci":
  - changed-files:
    - any-glob-to-any-file:
      - ".github/**"

"area: scripts":
  - changed-files:
    - any-glob-to-any-file:
      - "scripts/**"

"type: config":
  - changed-files:
    - any-glob-to-any-file:
      - "biome.json"
      - "turbo.json"
      - "*.env*"
      - "drizzle.config.ts"
      - "tsconfig*"
