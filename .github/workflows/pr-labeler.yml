name: PR Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  label-by-files:
    name: Label by Changed Files
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Label based on changed paths
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

  label-by-commits:
    name: Label by Commit Messages
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commits for breaking changes
        id: check-breaking
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Scanning commits from $BASE_SHA to $HEAD_SHA..."

          # Collect all commit messages in the PR
          COMMITS=$(git log "$BASE_SHA".."$HEAD_SHA" --pretty=format:"%s %b")

          echo "Commit messages:"
          echo "$COMMITS"

          # Check for breaking change indicators (Conventional Commits spec + common patterns)
          if echo "$COMMITS" | grep -qiE \
            'BREAKING[[:space:]]+CHANGE|breaking[[:space:]]+change|!:|feat!|fix!|refactor!|perf!|chore!'; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Breaking change detected in commit messages."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No breaking changes detected."
          fi

      - name: Add breaking-change label
        if: steps.check-breaking.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: ["breaking-change"],
            });

            core.info(`Added 'breaking-change' label to PR #${issue_number}`);

      - name: Remove breaking-change label (if no longer applicable)
        if: steps.check-breaking.outputs.found == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            try {
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number,
                name: "breaking-change",
              });
              core.info("Removed 'breaking-change' label (no longer applicable).");
            } catch (e) {
              if (e.status !== 404) throw e;
            }
