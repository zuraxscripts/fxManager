name: Build and Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-b*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Sync Versions
        run: |
          bun bump-version ${{ github.ref_name }}

      - name: Commit Updated Versions
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff-index --quiet HEAD || git commit -m "chore: update versions to ${{ github.ref_name }}"
          git push origin HEAD:main 

      - name: Run Build
        run: bun run build

      - name: Package Assets
        run: |
          cd dist
          zip -r ../fxmanager-linux.zip fxmanager-linux public/
          zip -r ../fxmanager-windows.zip fxmanager-windows.exe public/
          zip -r ../fxmanager-resource.zip resource/
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            fxmanager-linux.zip
            fxmanager-windows.zip
            fxmanager-resource.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-b') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
