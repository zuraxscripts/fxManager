name: PR Code Verification

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "bun.lockb"
      - "scripts/build.ts"

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Execute Test Runner
        run: bun test

  build:
    name: Verify Build System (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Run Platform Compilation Test
        run: bun run build --target=${{ matrix.os == 'windows-latest' && 'windows' || 'linux' }}
